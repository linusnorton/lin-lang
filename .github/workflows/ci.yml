name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-22 llvm-22-dev llvm-22-runtime clang-22 libpolly-22-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"

      - name: Install LLVM 22 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@22 || brew install llvm
          PREFIX=$(brew --prefix llvm@22 2>/dev/null || brew --prefix llvm)
          echo "LLVM_SYS_221_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          echo "${PREFIX}/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Run examples through lin run
        run: |
          for f in examples/*.lin; do
            case "$f" in
              examples/ffi-c.lin|\
              examples/http-client.lin|\
              examples/showcase.lin|\
              examples/template.lin) echo "SKIP $f"; continue ;;
            esac
            echo "==> $f"
            cargo run -p lin --quiet -- run "$f" || exit 1
          done

      - name: Run stdlib and example tests
        run: cargo run -p lin --quiet -- test stdlib/ examples/ --timeout 120

  # AddressSanitizer leg: builds an instrumented lin-runtime and links the compiled
  # test programs against it on the LinIR path, then runs the stdlib suite under ASan.
  # This is the standing guard for loop-body / projection / container refcounting on
  # the new IR backend (the AST path masks several latent leaks; ASan catches the
  # use-after-frees they hide).
  asan:
    name: ASan (LinIR path, Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-22 llvm-22-dev llvm-22-runtime clang-22 libpolly-22-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"

      - name: Install Rust nightly (for -Zsanitizer)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: asan-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: asan-cargo-

      - name: Build lin (compiler) and the ASan-instrumented runtime
        run: |
          cargo build -p lin
          RUSTFLAGS="-Zsanitizer=address" cargo +nightly build \
            -p lin-runtime --target x86_64-unknown-linux-gnu

      - name: Build + run each stdlib test under AddressSanitizer (LinIR path)
        env:
          # LinIR is the default backend; no LIN_USE_IR needed.
          LIN_EMIT_IR: "1"
          LIN_NO_OPT: "1"
        run: |
          RT="$(find target/x86_64-unknown-linux-gnu/debug -name liblin_runtime.a | head -1)"
          fail=0
          for f in stdlib/*.test.lin; do
            echo "==> $f"
            cargo run -p lin --quiet -- build "$f" -o /tmp/asan_test || { echo "BUILD FAIL $f"; fail=1; continue; }
            clang-22 -fsanitize=address -g /tmp/asan_test.ll "$RT" -o /tmp/asan_test_bin
            # Leak detection off: the stdlib intentionally retains program-lifetime
            # globals (module init state) that are never released at exit.
            if ! ASAN_OPTIONS=detect_leaks=0 /tmp/asan_test_bin > /tmp/asan_out 2>&1; then
              echo "ASAN FAILURE in $f:"; cat /tmp/asan_out; fail=1
            fi
            rm -f /tmp/asan_test.ll
          done
          exit $fail

      # Runtime unit tests under AddressSanitizer. The stdlib-test leg above is the
      # *integration* guard, but its coverage is incidental: a heap bug only crashes
      # when later allocations happen to reuse the corrupted region, so it can pass by
      # luck. This leg runs the lin-runtime #[test] suite (memory layout / free / RC
      # invariants) directly under ASan, giving a deterministic guard for those bugs.
      - name: Run lin-runtime unit tests under AddressSanitizer
        env:
          # std::process::exit in some runtime paths trips the leak checker at exit;
          # these tests assert behaviour, not leak-freedom, so disable LSan here.
          ASAN_OPTIONS: detect_leaks=0
          RUSTFLAGS: "-Zsanitizer=address"
          RUSTDOCFLAGS: "-Zsanitizer=address"
        run: |
          cargo +nightly test -p lin-runtime \
            --target x86_64-unknown-linux-gnu

  # ThreadSanitizer leg: the right tool for the concurrency RC-race class (async/parallel/
  # ThreadPool/Worker, Shared<T> atomic box, Frozen<T> immortal reads). Runs the lin-runtime
  # #[test] suite — which includes multi-threaded tests (concurrent Shared get/set, etc.) —
  # under TSan, building std instrumented via -Zbuild-std (requires the rust-src component).
  tsan:
    name: TSan (lin-runtime, Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-22 llvm-22-dev llvm-22-runtime clang-22 libpolly-22-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"

      - name: Install Rust nightly (for -Zsanitizer + -Zbuild-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: tsan-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: tsan-cargo-

      - name: Run lin-runtime unit tests under ThreadSanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=thread"
          RUSTDOCFLAGS: "-Zsanitizer=thread"
          # The runtime intentionally retains program-lifetime globals; TSan only flags races.
          TSAN_OPTIONS: report_signal_unsafe=0
        run: |
          # --lib: run the unit-test suite (which holds the multi-threaded race tests). Doctests
          # are skipped — under -Zbuild-std rustdoc can't reconcile the sanitizer ABI across a
          # transitive dependency, an artifact unrelated to the race-class guard.
          cargo +nightly test -p lin-runtime -Zbuild-std --lib \
            --target x86_64-unknown-linux-gnu
