name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Run examples through lin
        run: |
          for f in examples/*.lin; do
            # Skip examples that require the native compiler (lin build) or live network
            case "$f" in
              examples/ffi_c.lin) echo "SKIP $f (requires lin build)"; continue ;;
              examples/http-client.lin) echo "SKIP $f (requires network)"; continue ;;
            esac
            echo "==> $f"
            cargo run -p lin --quiet -- "$f" || exit 1
          done
