name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: lin-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: lin-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-22 llvm-22-dev llvm-22-runtime clang-22 libpolly-22-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"

      - name: Install LLVM 22 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@22 || brew install llvm
          PREFIX=$(brew --prefix llvm@22 2>/dev/null || brew --prefix llvm)
          echo "LLVM_SYS_221_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          echo "${PREFIX}/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release -p lin --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/lin

      - name: Package
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/lin dist/lin
          cd dist && tar -czf ../${{ matrix.artifact }}.tar.gz lin

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    name: Publish "latest" pre-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Delete existing "latest" tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/git/refs/tags/latest \
            -X DELETE || true

      - name: Create rolling "latest" pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          prerelease: true
          body: |
            Automated build from `master`.

            **Commit:** ${{ github.sha }}
            **Built:** ${{ github.event.head_commit.timestamp }}

            ## Installation

            Download the archive for your platform, extract, and place `lin` on your `$PATH`.

            > **Note:** The Linux binary requires `clang` (or any C linker) to link compiled programs.
            > No LLVM installation needed — LLVM is bundled inside `lin`.
          files: dist/*.tar.gz
