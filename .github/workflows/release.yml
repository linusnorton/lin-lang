name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: lin-linux-x86_64
            vsix_platform: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: lin-macos-arm64
            vsix_platform: darwin-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git rev-list --count

      - name: Install LLVM 22 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-22 llvm-22-dev llvm-22-runtime clang-22 libpolly-22-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"

      - name: Install LLVM 22 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@22 || brew install llvm
          PREFIX=$(brew --prefix llvm@22 2>/dev/null || brew --prefix llvm)
          echo "LLVM_SYS_221_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          echo "${PREFIX}/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binaries
        run: |
          cargo build --release -p lin --target ${{ matrix.target }}
          cargo build --release -p lin-lsp --target ${{ matrix.target }}

      - name: Strip binaries
        run: |
          strip target/${{ matrix.target }}/release/lin
          strip target/${{ matrix.target }}/release/lin-lsp

      - name: Package compiler tarball
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/lin dist/lin
          cp target/${{ matrix.target }}/release/lin-lsp dist/lin-lsp
          cd dist && tar -czf ../${{ matrix.artifact }}.tar.gz lin lin-lsp

      - name: Package platform-specific VSIX
        run: |
          export PATCH=$(git rev-list --count HEAD)
          mkdir -p editors/vscode/bin/${{ matrix.vsix_platform }}
          cp target/${{ matrix.target }}/release/lin     editors/vscode/bin/${{ matrix.vsix_platform }}/lin
          cp target/${{ matrix.target }}/release/lin-lsp editors/vscode/bin/${{ matrix.vsix_platform }}/lin-lsp
          cd editors/vscode
          npm install
          # Stamp patch version from commit count so marketplace never sees a duplicate.
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json'));
            const parts = p.version.split('.');
            p.version = parts[0] + '.' + parts[1] + '.' + process.env.PATCH;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          npx @vscode/vsce package \
            --target ${{ matrix.vsix_platform }} \
            --no-dependencies \
            -o ../../lin-lang-${{ matrix.vsix_platform }}.vsix

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        working-directory: editors/vscode
        run: |
          npx @vscode/vsce publish \
            --target ${{ matrix.vsix_platform }} \
            --no-dependencies \
            --packagePath ../../lin-lang-${{ matrix.vsix_platform }}.vsix
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            lin-lang-${{ matrix.vsix_platform }}.vsix

  release:
    name: Publish "latest" pre-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Publish "latest" release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          BUILT_AT: ${{ github.event.head_commit.timestamp }}
        run: |
          cat > /tmp/release-notes.md << 'NOTES'
          Automated build from `master`.

          **Commit:** ${COMMIT_SHA}
          **Built:** ${BUILT_AT}

          ## Installation

          Download the archive for your platform, extract, and place `lin` on your `$PATH`.

          > **Note:** The Linux binary requires `clang` (or any C linker) to link compiled programs.
          > No LLVM installation needed — LLVM is bundled inside `lin`.

          ## VS Code Extension

          Download the `.vsix` for your platform and install with:
          ```bash
          code --install-extension lin-lang-<platform>.vsix
          ```

          Or install directly from the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=LinusN.lin-lang).
          NOTES

          # Substitute env vars into the notes file
          sed -i "s|\${COMMIT_SHA}|${COMMIT_SHA}|g; s|\${BUILT_AT}|${BUILT_AT}|g" /tmp/release-notes.md

          gh release delete latest --repo ${{ github.repository }} --yes --cleanup-tag || true
          sleep 3
          gh release create latest dist/* \
            --repo ${{ github.repository }} \
            --title "Latest build" \
            --prerelease \
            --notes-file /tmp/release-notes.md
